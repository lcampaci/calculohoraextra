<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Histórico</title>

<style>

body{
    font-family:Arial;
    background:#eef1f5;
    margin:0;
    padding:10px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:10px;
    border-radius:8px;
    box-shadow:0 0 6px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#1565c0;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th{
    background:#1565c0;
    color:#fff;
    padding:8px;
}

td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}

tr:nth-child(even){
    background:#f5f5f5;
}

.btn{
    display:inline-block;
    margin-bottom:10px;
    padding:8px 12px;
    background:#1565c0;
    color:#fff;
    text-decoration:none;
    border-radius:5px;
}

</style>
</head>
<body>

<div class="container">

    <a href="index.html" class="btn">
        Voltar
    </a>

    <h1>Histórico Mensal</h1>

    <table>

        <thead>
            <tr>
                <th>Mês/Ano</th>
                <th>Total Min</th>
                <th>Total Horas</th>
                <th>Hora Extra</th>
            </tr>
        </thead>

        <tbody id="historicoTabela"></tbody>

    </table>

</div>

<script>

const tbody =
    document.getElementById("historicoTabela");

const historico =
    JSON.parse(
        localStorage.getItem("historicoHoraExtra")
    ) || {};

Object.keys(historico)
.sort()
.reverse()
.forEach(chave => {

    const item =
        historico[chave];

    const tr =
        document.createElement("tr");

    tr.innerHTML = `
        <td>${item.mesAno}</td>
        <td>${item.totalMinutos}</td>
        <td>${item.totalHorasTexto}</td>
        <td>
            R$ ${Number(item.valorExtra)
                .toLocaleString("pt-BR")}
        </td>
    `;

    tbody.appendChild(tr);
});

</script>

</body>
</html>
