<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="./icon-192.png">
  <meta name="author" content="Luis Henrique Campaci">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#22c55e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Controle Hora Extra</title>

<style>

*{
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    margin:0;
    padding:6px;
    background:#eef1f5;
}

.container{
    max-width:1100px;
    margin:auto;
    background:#fff;
    padding:8px;
    border-radius:8px;
    box-shadow:0 0 6px rgba(0,0,0,.1);
}

h1{
    margin:0 0 8px;
    text-align:center;
    color:#1565c0;
    font-size:18px;
}

.topo{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    align-items:end;
    margin-bottom:8px;
}

.campo{
    display:flex;
    flex-direction:column;
    gap:2px;
}

label{
    font-size:11px;
    font-weight:bold;
}

input{
    padding:2px 4px;
    border:1px solid #ccc;
    border-radius:4px;
    font-size:11px;
    height:24px;
}

.btn{
    height:24px;
    border:none;
    color:#fff;
    padding:0 10px;
    border-radius:4px;
    cursor:pointer;
    font-size:11px;
    font-weight:bold;
}

.salvar{
    background:#2e7d32;
}

.resetar{
    background:#d32f2f;
}

.resumo{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:6px;
    margin-bottom:8px;
}

.card{
    background:#f8f9fa;
    padding:6px;
    border-radius:5px;
    border-left:3px solid #1565c0;
}

.card h3{
    margin:0;
    font-size:10px;
}

.valor{
    margin-top:2px;
    font-size:16px;
    font-weight:bold;
    color:#1565c0;
}

.tabelas{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:10px;
    border-spacing:0 3px; /* espaço entre linhas */
}

tr{
    height:26px; /* aumenta espaço entre linhas */
}

th{
    background:#1565c0;
    color:#fff;
    padding:2px;
    height:22px;
}

td{
    border:1px solid #ddd;
    padding:1px;
    text-align:center;
    height:26px; /* aumenta altura da linha */
}

/* colunas mais estreitas */
th, td{
    min-width:26px;
}

td:first-child{
    width:28px;
}

/* inputs mais compactos */
td input{
    width:32px;
    height:18px;
    padding:0;
    text-align:center;
    font-size:10px;
}

.totalDia{
    font-weight:bold;
    color:#1565c0;
    width:30px;
}

.bloqueado{
    background:#dcdcdc;
}

.bloqueado input{
    background:#cfcfcf;
    pointer-events:none;
}

@media(max-width:900px){

    .tabelas{
        grid-template-columns:1fr;
    }

    .resumo{
        grid-template-columns:1fr;
    }
}

</style>
</head>
<body>

<div class="container">

    <h1>Controle Hora Extra</h1>

    <div class="topo">

        <div class="campo">
            <label>Mês/Ano</label>
            <input type="month" id="mesAno">
        </div>

        <div class="campo">
            <label>Salário</label>
            <input type="number" id="salario">
        </div>

        <button class="btn salvar" onclick="salvarTudo()">
            Salvar
        </button>

        <button class="btn resetar" onclick="resetarTudo()">
            Resetar
        </button>
<button class="btn salvar" onclick="exportarDados()">Exportar</button>

<label class="btn salvar" style="display:inline-flex;align-items:center;justify-content:center;cursor:pointer;">
    Importar
    <input type="file" accept="application/json" onchange="importarDados(event)" style="display:none;">
</label>

    </div>

    <div class="resumo">

        <div class="card">
            <h3>Total Min</h3>
            <div class="valor" id="totalMinutos">0</div>
        </div>

        <div class="card">
            <h3>Total Horas</h3>
            <div class="valor" id="totalHoras">0h 0m</div>
        </div>

        <div class="card">
            <h3>Hora Extra</h3>
            <div class="valor" id="valorExtra">R$ 0,00</div>
        </div>

    </div>

    <div class="tabelas">

        <table>

            <thead>
                <tr>
                    <th>D</th>
                    <th>M1</th>
                    <th>M2</th>
                    <th>M3</th>
                    <th>M4</th>
                    <th>T</th>
                </tr>
            </thead>

            <tbody id="tabela1"></tbody>

        </table>

        <table>

            <thead>
                <tr>
                    <th>D</th>
                    <th>M1</th>
                    <th>M2</th>
                    <th>M3</th>
                    <th>M4</th>
                    <th>T</th>
                </tr>
            </thead>

            <tbody id="tabela2"></tbody>

        </table>

    </div>

</div>

<script>

const tabela1 = document.getElementById("tabela1");
const tabela2 = document.getElementById("tabela2");
const mesAno = document.getElementById("mesAno");
const salario = document.getElementById("salario");

function feriados(ano){

    return [

        `${ano}-01-01`,
        `${ano}-04-21`,
        `${ano}-05-01`,
        `${ano}-09-07`,
        `${ano}-10-12`,
        `${ano}-11-02`,
        `${ano}-11-15`,
        `${ano}-12-25`

    ];
}

function gerarTabela(){

    tabela1.innerHTML = "";
    tabela2.innerHTML = "";

    if(!mesAno.value) return;

    const [ano, mes] = mesAno.value.split("-");

    const diasNoMes =
        new Date(ano, mes, 0).getDate();

    const metade =
        Math.ceil(diasNoMes / 2);

    const listaFeriados =
        feriados(ano);

    for(let dia = 1; dia <= diasNoMes; dia++){

        const data =
            new Date(ano, mes - 1, dia);

        const domingo =
            data.getDay() === 0;

        const dataTexto =
            `${ano}-${String(mes).padStart(2,"0")}-${String(dia).padStart(2,"0")}`;

        const feriado =
            listaFeriados.includes(dataTexto);

        const bloqueado =
            domingo || feriado;

        const tr =
            document.createElement("tr");

        if(bloqueado){
            tr.classList.add("bloqueado");
        }

        let html = `<td>${dia}</td>`;

        for(let i = 1; i <= 4; i++){

            html += `
                <td>
                    <input
    type="number"
    min="0"
    value=""
    class="minuto"
    data-dia="${dia}"
    data-col="${i}"
    ${bloqueado ? "disabled" : ""}
>
                </td>
            `;
        }

        html += `<td class="totalDia">0</td>`;

        tr.innerHTML = html;

        if(dia <= metade){
            tabela1.appendChild(tr);
        }else{
            tabela2.appendChild(tr);
        }
    }

    carregarDadosInputs();

    adicionarEventos();

    calcularTudo();
}



function adicionarEventos(){

    document.querySelectorAll(".minuto")
    .forEach(input => {

        input.addEventListener("input", () => {

            calcularTudo();

        });

    });
}

function calcularTudo(){

    let total = 0;

    document.querySelectorAll(".totalDia")
    .forEach(td => {

        const tr = td.parentElement;

        let totalDia = 0;

        tr.querySelectorAll(".minuto")
        .forEach(input => {

            const v = input.value.trim();
totalDia += v === "" ? 0 : Number(v);

        });

        td.innerText = totalDia;

        total += totalDia;
    });

    document.getElementById("totalMinutos")
    .innerText = total;

    const horas =
        Math.floor(total / 60);

    const minutos =
        total % 60;

    document.getElementById("totalHoras")
    .innerText =
        `${horas}h ${minutos}m`;

    const sal =
        Number(salario.value) || 0;

    const totalHoras =
        total / 60;

    const extra =
        (sal / 220)
        * 1.6
        * totalHoras;

    document.getElementById("valorExtra")
    .innerText =
        extra.toLocaleString(
            "pt-BR",
            {
                style:"currency",
                currency:"BRL"
            }
        );
}

function salvarTudo(){

    const dados = {

        mesAno: mesAno.value,

        salario: salario.value,

        minutos:{}

    };

    document.querySelectorAll(".minuto")
    .forEach(input => {

        const chave =
            input.dataset.dia +
            "-" +
            input.dataset.col;

        dados.minutos[chave] =
    input.value === "" ? "" : input.value;
    });

    localStorage.setItem(
        "controleHoraExtra",
        JSON.stringify(dados)
    );

    alert("Dados salvos!");
}

function carregarDadosInputs(){

    const dados =
        JSON.parse(
            localStorage.getItem(
                "controleHoraExtra"
            )
        );

    if(!dados) return;

    salario.value =
        dados.salario || "";

    document.querySelectorAll(".minuto")
    .forEach(input => {

        const chave =
            input.dataset.dia +
            "-" +
            input.dataset.col;

        if(
            dados.minutos &&
            dados.minutos[chave] !== undefined
        ){

            const valor = dados.minutos[chave];

input.value =
    (valor === "0" || valor === 0) ? "" : valor;
        }
    });
}

function resetarTudo(){

    if(confirm("Apagar todos os dados?")){

        localStorage.removeItem(
            "controleHoraExtra"
        );

        location.reload();
    }
}

mesAno.addEventListener("input", gerarTabela);

salario.addEventListener("input", calcularTudo);

window.onload = () => {

    const dados =
        JSON.parse(
            localStorage.getItem(
                "controleHoraExtra"
            )
        );

    if(dados){

        mesAno.value =
            dados.mesAno || "";

        salario.value =
            dados.salario || "";

        gerarTabela();
    }
};

function exportarDados(){

    const dados = localStorage.getItem("controleHoraExtra");

    if(!dados){
        alert("Não há dados para exportar!");
        return;
    }

    let nomeArquivo = "hora-extra-backup";

    if (mesAno.value) {
        const [ano, mes] = mesAno.value.split("-");
        nomeArquivo = `hora-extra-${mes}_${ano}`;
    }

    const blob = new Blob([dados], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = `${nomeArquivo}.json`;
    a.click();

    URL.revokeObjectURL(url);
}

function importarDados(event){

    const file = event.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){

        try{

            const dados = JSON.parse(e.target.result);

            localStorage.setItem(
                "controleHoraExtra",
                JSON.stringify(dados)
            );

            location.reload();

        }catch(err){

            alert("Arquivo inválido!");
        }
    };

    reader.readAsText(file);
}

    window.addEventListener("resize", fixViewport);
window.addEventListener("orientationchange", fixViewport);
fixViewport();


    if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("./service-worker.js").then(() => {
                    console.log("PWA instalada!");
                }).catch(err => {
                    console.log("Erro:", err);

                });
            });
        }

</script>

</body>
</html>
